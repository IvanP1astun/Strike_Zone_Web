<!DOCTYPE html>
<html>
<head>
    <title>Добавить новость</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Добавить новость</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="{{ form.title.id_for_label }}" class="form-label">Заголовок</label>
                {{ form.title }}
            </div>
            
            <div class="mb-3">
                <label for="{{ form.content.id_for_label }}" class="form-label">Содержание</label>
                {{ form.content }}
            </div>
            
            <div class="mb-3 form-check">
                {{ form.is_published }}
                <label for="{{ form.is_published.id_for_label }}" class="form-check-label">
                    Опубликовать сразу
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</body>
</html>
